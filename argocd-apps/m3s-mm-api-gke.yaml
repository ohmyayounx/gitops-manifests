apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: m3s-mm-api-gke
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ohmyayounx/gitops-manifests.git
    targetRevision: main
    path: m3s-mm-api-gke
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: m3s-mm-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
