apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: m3s-mm-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ohmyayounx/gitops-manifests.git
    targetRevision: main
    path: m3s-mm-api
    directory:
      recurse: true
  destination:
    server: https://139.180.191.232:6443
    namespace: m3s-mm-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
