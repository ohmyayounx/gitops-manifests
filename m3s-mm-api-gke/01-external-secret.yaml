##############################################
# GKE: Pakai GCP Secret Manager sebagai backend
# (Lihat m3s-ms-api-gke/01-external-secret.yaml untuk setup lengkap)
##############################################
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mm-api-env
  namespace: m3s-mm-api
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: mm-api-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: m3s-mm-api-env  # Nama secret di GCP Secret Manager
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mm-api-gcp-credentials
  namespace: m3s-mm-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: mm-api-gcp-credentials
    creationPolicy: Owner
  data:
    - secretKey: service_account_credential.json
      remoteRef:
        key: m3s-mm-api-service-account
