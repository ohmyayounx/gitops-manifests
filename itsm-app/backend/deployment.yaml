apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: production-itsm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nslookup postgres.production-itsm.svc.cluster.local; do echo "Waiting for postgres DNS..."; sleep 2; done']
      containers:
        - name: backend
          image: ay0unx/itsm-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: itsm-secrets
            - configMapRef:
                name: itsm-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: production-itsm
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
