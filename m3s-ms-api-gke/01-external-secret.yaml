##############################################
# GKE: Pakai GCP Secret Manager sebagai backend
#
# Opsi 1: GCP Secret Manager (native GKE, recommended)
# Opsi 2: Vault via External Secrets (jika tetap mau pakai Vault)
#
# Prerequisites untuk GCP Secret Manager:
# 1. Enable Secret Manager API:
#    gcloud services enable secretmanager.googleapis.com
#
# 2. Buat GKE Workload Identity:
#    gcloud iam service-accounts create external-secrets-sa \
#      --display-name="External Secrets SA"
#
#    gcloud projects add-iam-policy-binding it-re-492803 \
#      --member="serviceAccount:external-secrets-sa@it-re-492803.iam.gserviceaccount.com" \
#      --role="roles/secretmanager.secretAccessor"
#
#    gcloud iam service-accounts add-iam-policy-binding \
#      external-secrets-sa@it-re-492803.iam.gserviceaccount.com \
#      --role="roles/iam.workloadIdentityUser" \
#      --member="serviceAccount:it-re-492803.svc.id.goog[external-secrets/external-secrets]"
#
# 3. Install External Secrets Operator:
#    helm install external-secrets external-secrets/external-secrets \
#      -n external-secrets --create-namespace \
#      --set serviceAccount.annotations."iam\.gke\.io/gcp-service-account"=external-secrets-sa@it-re-492803.iam.gserviceaccount.com
##############################################

# ====== OPSI 1: Pakai GCP Secret Manager ======
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: it-re-492803
---
# ExternalSecret - ms-api environment variables
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ms-api-env
  namespace: m3s-ms-api
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: ms-api-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: m3s-ms-api-env  # Nama secret di GCP Secret Manager
---
# ExternalSecret - GCP Service Account credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ms-api-gcp-credentials
  namespace: m3s-ms-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: ms-api-gcp-credentials
    creationPolicy: Owner
  data:
    - secretKey: service_account_credential.json
      remoteRef:
        key: m3s-ms-api-service-account

