apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mm-api
  namespace: mm-api
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: development-mm-m3sbri-api.pcsindonesia.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mm-api
                port:
                  number: 8002
