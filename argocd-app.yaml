apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: itsm-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ohmyayounx/gitops-manifests.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
