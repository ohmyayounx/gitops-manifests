# Secret untuk pull image dari DockerHub (private repo)
# Buat manual sekali di cluster:
#
# kubectl create secret docker-registry dockerhub-pull \
#   --namespace=m3s-ms-api \
#   --docker-server=https://index.docker.io/v1/ \
#   --docker-username=devopspcs \
#   --docker-password=<DOCKER_PASSWORD> \
#   --docker-email=devops@pcsindonesia.com
#
# JANGAN simpan di Git karena mengandung credentials!
# ArgoCD akan ignore resource ini jika sudah ada.
#
# Atau bisa ditambahkan ke Vault dan pakai ExternalSecret:
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dockerhub-pull
  namespace: m3s-ms-api
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: dockerhub-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"https://index.docker.io/v1/":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: m3s/docker/registry
        property: username
    - secretKey: password
      remoteRef:
        key: m3s/docker/registry
        property: password
