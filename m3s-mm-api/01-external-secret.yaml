##############################################
# Prerequisites:
# 1. Install External Secrets Operator di cluster:
#    helm repo add external-secrets https://charts.external-secrets.io
#    helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# 2. Buat Secret untuk Vault auth (sekali saja):
#    kubectl create secret generic vault-credentials \
#      --from-literal=username=<vault-user> \
#      --from-literal=password=<vault-pass> \
#      -n m3s-mm-api
##############################################

# SecretStore - koneksi ke Vault
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: m3s-mm-api
spec:
  provider:
    vault:
      server: "http://10.184.20.4:8200"
      path: "development"
      version: "v2"
      auth:
        userPass:
          path: userpass
          username: "devopspcs"
          secretRef:
            name: vault-credentials
            key: password
---
# ExternalSecret - sync env secrets dari Vault ke K8s Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mm-api-env
  namespace: m3s-mm-api
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: mm-api-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: m3s/api/mm-api/env
---
# ExternalSecret - sync GCP service account dari Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mm-api-gcp-credentials
  namespace: m3s-mm-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: mm-api-gcp-credentials
    creationPolicy: Owner
  data:
    - secretKey: service_account_credential.json
      remoteRef:
        key: m3s/api/mm-api/service_account
        property: content
